# Docs: https://herdr.dev/docs/configuration/

onboarding = false

[keys]
prefix = "ctrl+b"
focus_agent = "cmd+ctrl+1..9"

[[keys.command]]
key = "cmd+ctrl+r"
type = "shell"
command = "$HOME/.dotfiles/bin/herdr-hunk-toggle.sh"

[[keys.command]]
key = "cmd+ctrl+a"
type = "shell"
command = "$HOME/.dotfiles/bin/herdr-hunk-prompt.sh"

[[keys.command]]
key = "cmd+ctrl+g"
type = "popup"
command = "lazygit"
width = "90%"
height = "90%"

[[keys.command]]
key = "cmd+ctrl+t"
type = "popup"
command = "exec ${SHELL:-zsh}"
width = "90%"
height = "90%"

[[keys.command]]
key = "cmd+ctrl+e"
type = "popup"
command = "exec nvim -c \"Neotree show\""
width = "90%"
height = "90%"

[experimental]
switch_ascii_input_source_in_prefix = true

pane_history = false
[ui.toast]
delivery = "terminal"

[theme]
name = "terminal"
auto_switch = false

[ui]
show_agent_labels_on_pane_borders = false
