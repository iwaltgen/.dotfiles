# Docs: https://ghostty.org/docs/config/reference

# ~/.config/ghostty/config

theme = GitHub Dark Dimmed

# 폰트 설정
# font-family = "Hack Nerd Font Mono"
# font-size = 14
font-family = "D2CodingLigature Nerd Font Mono"
font-size = 15

# 윈도우 설정
macos-option-as-alt = true
macos-titlebar-style = tabs

# Background (반투명 + 블러)
background-opacity = 0.9
background-blur-radius = 20

# Cursor 설정
cursor-style = block

# Shell integration 설정
shell-integration = zsh
shell-integration-features = no-cursor

# 선택 설정
copy-on-select = clipboard

# Herdr/Hunk 단축키 (키보드 입력 소스와 무관한 물리 키)
keybind = ctrl+KeyB=text:\x02
keybind = ctrl+KeyS=text:\x13
# CSI-u modifier 13 = 1 + Ctrl(4) + Cmd(8)
keybind = cmd+ctrl+KeyA=csi:97;13u
keybind = cmd+ctrl+KeyR=csi:114;13u
keybind = cmd+ctrl+KeyG=csi:103;13u

# # 커서 이동 (Home/End)
keybind = cmd+left=text:\x1bOH
keybind = cmd+right=text:\x1bOF
